<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px; overflow: hidden;
    background-color: #000033;
    background-image:
      radial-gradient(circle, #ffffff 1px, transparent 1px),
      radial-gradient(circle, #ffffff 1px, transparent 1px);
    background-size: 50px 50px, 83px 83px;
    background-position: 0 0, 25px 41px;
    font-family: 'Comic Sans MS', 'Comic Sans', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-align: center;
  }
  .bird { font-size: 72px; line-height: 1; }
  .title {
    font-size: 38px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 2px 2px 0 #cc0000, 4px 4px 0 #000;
    letter-spacing: 1px;
    line-height: 1;
  }
  .tagline {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    color: #99ffbb;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="bird">🐦</div>
  <div class="title">CARRIER PIGEON</div>
  <div class="tagline">utm_source=carrier_pigeon</div>
</body>
</html>
