name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate manifest.json is well-formed JSON
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"

      - name: Syntax-check JavaScript files
        run: |
          node --check background.js
          node --check popup.js
          node --check utm-data.js
